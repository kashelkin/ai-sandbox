# Don't read /etc/hosts
no-hosts
# Don't read /etc/resolv.conf - use explicit upstream
no-resolv
# Use Docker's embedded DNS as upstream
server=127.0.0.11
# Listen only on localhost
listen-address=127.0.0.1
bind-interfaces
# Port for local DNS
port=53
# Dynamically add resolved IPs to ipset
ipset=/github.com/allowed-domains
ipset=/registry.npmjs.org/allowed-domains
ipset=/api.anthropic.com/allowed-domains
ipset=/statsig.anthropic.com/allowed-domains
ipset=/sentry.io/allowed-domains
ipset=/nuget.org/allowed-domains
ipset=/visualstudio.com/allowed-domains
