name: ${PROJECT_NAME}

services:
  sandbox:
    build:
      context: .
      args:
          SANDBOX_IMAGE: ${SANDBOX_IMAGE}
          CONTAINER_USER: ${CONTAINER_USER}
    network_mode: "service:firewall"
    stdin_open: true
    tty: true
    depends_on:
      firewall:
        condition: service_healthy
    cap_drop:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ../src:/src:rw

      # Claude Code - auth & credentials
      - ~/.claude.json:/home/${CONTAINER_USER}/.claude.json
      - ~/.claude/.credentials.json:/home/${CONTAINER_USER}/.claude/.credentials.json

      # Claude Code - shared config
      - ~/.claude/settings.json:/home/${CONTAINER_USER}/.claude/settings.json
      - ~/.claude/CLAUDE.md:/home/${CONTAINER_USER}/.claude/CLAUDE.md
      - ~/.claude/commands:/home/${CONTAINER_USER}/.claude/commands
      - ~/.claude/agents:/home/${CONTAINER_USER}/.claude/agents
      - ~/.claude/statusline-command.sh:/home/${CONTAINER_USER}/.claude/statusline-command.sh

      # Claude Code - isolated history per project (named volume)
      - claude-history:/home/${CONTAINER_USER}/.claude/projects

      # NuGet cache (shared across containers for speed)
      - nuget-cache:/home/${CONTAINER_USER}/.nuget/packages

      # dotnet global tools
      - dotnet-tools:/home/${CONTAINER_USER}/.dotnet

  firewall:
    build:
      context: ./firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./firewall/config/dnsmasq.conf:/etc/dnsmasq.conf:ro
      - ./firewall/scripts:/firewall:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/firewall-ready"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  claude-history:
  nuget-cache:
  dotnet-tools:
